{% extends "base.html" %}
{% block title %}Sign Up — AI News{% endblock %}

{% block nav %}
  <a href="/login" class="text-gray-600 hover:text-gray-900">Log in</a>
{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
  <h1 class="text-2xl font-bold mb-6">Create your account</h1>

  {% if error %}
  <div class="mb-4 rounded bg-red-50 border border-red-200 px-4 py-3 text-red-700 text-sm">{{ error }}</div>
  {% endif %}

  <form method="post" action="/signup" class="space-y-4">
    <div>
      <label class="block text-sm font-medium mb-1" for="name">Name</label>
      <input id="name" name="name" type="text" required
             class="w-full rounded border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
    </div>
    <div>
      <label class="block text-sm font-medium mb-1" for="email">Email</label>
      <input id="email" name="email" type="email" required
             class="w-full rounded border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
    </div>
    <div>
      <label class="block text-sm font-medium mb-1" for="password">Password</label>
      <input id="password" name="password" type="password" required minlength="8"
             class="w-full rounded border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
    </div>
    <button type="submit"
            class="w-full rounded bg-indigo-600 text-white py-2 text-sm font-medium hover:bg-indigo-700 transition">
      Create account
    </button>
  </form>
  <p class="mt-4 text-sm text-gray-500 text-center">
    Already have an account? <a href="/login" class="text-indigo-600 hover:underline">Log in</a>
  </p>
</div>
{% endblock %}
