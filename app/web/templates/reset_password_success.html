<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Success</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (stored === 'dark' || (!stored && prefersDark)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        html.dark body {
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            text-align: center;
        }
        html.dark .container {
            background: #1f2937;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.4);
        }
        h1 {
            color: #22863a;
            margin-top: 0;
        }
        html.dark h1 { color: #6ee7b7; }
        p {
            color: #666;
            line-height: 1.6;
        }
        html.dark p { color: #d1d5db; }
        a {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 0.75rem 1.5rem;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            transition: background 0.3s;
        }
        a:hover {
            background: #764ba2;
        }
        .theme-toggle {
            position: fixed;
            top: 1rem;
            right: 1rem;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.9);
            color: #444;
            border: 1px solid rgba(0, 0, 0, 0.1);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            z-index: 50;
            transition: background 0.2s, color 0.2s;
        }
        .theme-toggle:hover { background: rgba(255, 255, 255, 1); }
        html.dark .theme-toggle {
            background: rgba(31, 41, 55, 0.9);
            color: #f3f4f6;
            border-color: rgba(255, 255, 255, 0.1);
        }
        html.dark .theme-toggle:hover { background: rgba(31, 41, 55, 1); }
        .theme-toggle .icon-sun { display: none; }
        .theme-toggle .icon-moon { display: inline; }
        html.dark .theme-toggle .icon-sun { display: inline; }
        html.dark .theme-toggle .icon-moon { display: none; }
    </style>
</head>
<body>
    <button class="theme-toggle" type="button" aria-label="Toggle dark mode" title="Toggle dark mode" onclick="toggleTheme()">
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path></svg>
    </button>
    <div class="container">
        <h1>✓ Password Reset!</h1>
        <p>Your password has been successfully reset.</p>
        <p>You can now log in with your new password.</p>
        <a href="/login">Go to Login</a>
    </div>
    <script>
      function toggleTheme() {
        var root = document.documentElement;
        var isDark = root.classList.toggle('dark');
        try { localStorage.setItem('theme', isDark ? 'dark' : 'light'); } catch (e) {}
      }
    </script>
</body>
</html>
