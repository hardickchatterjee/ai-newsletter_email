services:
  - type: cron
    name: ai-news-daily-pipeline
    runtime: python
    schedule: "0 7 * * *"  # 7 AM UTC daily
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.daily_runner
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-news-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: MY_EMAIL
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: PROXY_USERNAME
        sync: false
      - key: PROXY_PASSWORD
        sync: false

databases:
  - name: ai-news-db
    databaseName: ai_news_aggregator
    user: ai_news_user
    plan: free
